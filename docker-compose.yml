services:
  pgsql:
    image: postgres:13-alpine
    restart: unless-stopped
    volumes:
      - ./volumes/postgres/data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-nextcloud}
      - POSTGRES_USER=${POSTGRES_USER:-nextcloud}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-nextcloud}
    ports:
      - 127.0.0.1:5432:5432
    command: postgres -c log_statement=all
  mysql:
    image: mysql
    volumes:
      - ./volumes/mysql/init:/docker-entrypoint-initdb.d
      - ./volumes/mysql/data:/var/lib/mysql
    ports:
      - 127.0.0.1:3306:3306
    restart: unless-stopped
    environment:
      - TZ=${TZ:-CET}
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-root}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-nextcloud}
      - MYSQL_USER=${MYSQL_USER:-nextcloud}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-nextcloud}
  nextcloud:
    image: ghcr.io/librecodecoop/nextcloud-dev-php${PHP_VERSION:-82}:latest
    # build:
    #   context: .docker/
    #   dockerfile: Dockerfile.php${PHP_VERSION:-82}
    volumes:
      - ./.docker/scripts/wait-for-db.php:/var/www/scripts/wait-for-db.php
      - ~/.composer:/var/www/.composer/
      - ~/.npm:/var/www/.npm/
      - ./volumes/nextcloud:/var/www/html
    restart: unless-stopped
    environment:
      - HOST_UID=${HOST_UID:-1000}
      - HOST_GID=${HOST_GID:-1000}
      - DEFAULT_PHONE_REGION=${DEFAULT_PHONE_REGION:-UTC}
      - NEXTCLOUD_ADMIN_USER=${NEXTCLOUD_ADMIN_USER:-admin}
      - NEXTCLOUD_ADMIN_PASSWORD=${NEXTCLOUD_ADMIN_PASSWORD:-admin}
      - NEXTCLOUD_ADMIN_EMAIL=${NEXTCLOUD_ADMIN_EMAIL:-a@test.tld}
      - DB_HOST=${DB_HOST:-mysql}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-nextcloud}
      - MYSQL_USER=${MYSQL_USER:-nextcloud}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-nextcloud}
      - POSTGRES_DB=${POSTGRES_DB:-nextcloud}
      - POSTGRES_USER=${POSTGRES_USER:-nextcloud}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-nextcloud}
      - MAIL_FROM_ADDRESS=${MAIL_FROM_ADDRESS:-nextcloud}
      - MAIL_DOMAIN=${MAIL_DOMAIN:-nextcloud.test}
      - MAIL_SMTPPORT=${MAIL_SMTPPORT:-1025}
      - MAIL_SMTPHOST=${MAIL_SMTPHOST:-mailpit}
      - VERSION_NEXTCLOUD=${VERSION_NEXTCLOUD:-master}
      - AUTOINSTALL=${AUTOINSTALL:-1}
      - XDEBUG_CONFIG
      - HTTP_PORT=${HTTP_PORT:-80}
    extra_hosts:
      - host.docker.internal:host-gateway
  nginx:
    # image: ghcr.io/librecodecoop/nextcloud-dev-nginx:latest
    build:
      context: .docker
      dockerfile: Dockerfile.nginx
    restart: unless-stopped
    volumes:
      - ./volumes/nextcloud:/var/www/html:ro
      - ./volumes/nginx/includes:/etc/nginx/conf.d/includes/
      - ./volumes/nginx/certs:/certs
    ports:
      - ${HTTP_PORT:-80}:80
      - 443:443
      - 8443:8443
  mailpit:
    image: axllent/mailpit
    ports:
      - 127.0.0.1:${MAILHOG_PORT:-8025}:8025
  redis:
    image: redis
  eurooffice:
    image: ghcr.io/euro-office/documentserver:latest
    restart: always
    volumes:
      - ./volumes/eurooffice:/home/eurooffice/.eurooffice
      - ./volumes/eurooffice/local.json:/etc/onlyoffice/documentserver/local.json
      - ./volumes/nextcloud/apps-extra/eurooffice-plugin:/var/www/onlyoffice/documentserver/sdkjs-plugins/libresign:ro
    ports:
      - 8080:80
    environment:
      - EXAMPLE_ENABLED=true
      - JWT_SECRET=${JWT_SECRET:-my_jwt_secret}
      - HOST_UID=${HOST_UID:-1000}
      - HOST_GID=${HOST_GID:-1000}
    extra_hosts:
      - host.docker.internal:host-gateway
  playwright:
    image: mcr.microsoft.com/playwright:v1.59.1-noble
    container_name: nextcloud-playwright
    volumes:
      - ./volumes/nextcloud:/var/www/html
    working_dir: /var/www/html
    ports:
      - 127.0.0.1:9323:9323
    environment:
      - PLAYWRIGHT_BASE_URL=${PLAYWRIGHT_BASE_URL:-https://nginx}
      - NODE_ENV=test
      - CI=${CI:-false}
    command: sleep infinity
    depends_on:
      - nextcloud
    restart: unless-stopped
    networks:
      - default
  signal-gateway:
    image: bbernhard/signal-cli-rest-api:latest
    restart: unless-stopped
    ports:
      - 127.0.0.1:5001:8080
    volumes:
      - ./volumes/signal:/home/.local/share/signal-cli
    environment:
      - LOG_LEVEL=info
  whatsapp.web:
    image: aldinokemal2104/go-whatsapp-web-multidevice
    restart: unless-stopped
    environment:
      - APP_PORT=3000
      - APP_DEBUG=true
      - APP_OS=cloud.libresign.coop
      - APP_ACCOUNT_VALIDATION=false
      - WHATSAPP_AUTO_DOWNLOAD_MEDIA=false
      - WHATSAPP_WEBHOOK=${WHATSAPP_WEBHOOK:-http://nginx/index.php/apps/twofactor_gateway/gowhatsapp/webhook}
      - WHATSAPP_WEBHOOK_SECRET=${WHATSAPP_WEBHOOK_SECRET:-change-this-secret}
      - WHATSAPP_WEBHOOK_EVENTS=${WHATSAPP_WEBHOOK_EVENTS:-message,message.ack,group.participants,chat_presence}
      - WHATSAPP_AUTO_REPLY="Conta de sistema. Para falar com a LibreCode, mande email para contato@libresign.coop"
    volumes:
      -  ./volumes/go-whatsapp-web:/usr/src/app/files

